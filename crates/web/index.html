<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Rad Roots</title>
    <base data-trunk-public-url />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0e1116;
        color: #f4efe1;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      #app-shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #radroots_studio_app_canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #loading_text {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <canvas id="radroots_studio_app_canvas"></canvas>
      <div id="loading_text">loading rad roots…</div>
    </div>
    <link data-trunk rel="copy-dir" href="../../assets" />
    <link data-trunk rel="rust" href="Cargo.toml" data-bin="radroots-app-web" />
  </body>
</html>
