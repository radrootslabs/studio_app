[workspace]
members = [
  "app",
  "crates/app-lib",
  "crates/core",
  "crates/ui-components",
  "crates/ui-core",
  "crates/ui-primitives",
  "crates/ui-tokens",
  "crates/utils"
]
exclude = [
]

resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.92.0"
license = "GPL-3.0-or-later"
authors = ["Radroots Authors"]
repository = "https://github.com/triesap/radroots"
readme = "README.md"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
leptos = { version = "0.8.17", default-features = false }
leptos_router = { version = "0.8.12", default-features = false }
icondata = { version = "0.7", default-features = false, features = ["lucide"] }
wasm-bindgen = "=0.2.114"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
async-trait = "0.1.89"
getrandom = "0.4"
js-sys = "0.3.91"
gloo-timers = "0.3"
web-sys = { version = "0.3.91", features = [
  "Crypto",
  "CryptoKey",
  "SubtleCrypto",
  "Window",
  "Document",
  "Element",
  "DomTokenList",
  "DomException",
  "DomStringList",
  "Event",
  "EventTarget",
  "File",
  "FileList",
  "FileReader",
  "Blob",
  "HtmlAnchorElement",
  "HtmlElement",
  "HtmlInputElement",
  "IdbDatabase",
  "IdbFactory",
  "IdbObjectStore",
  "IdbOpenDbRequest",
  "IdbRequest",
  "IdbTransaction",
  "IdbTransactionMode",
  "Coordinates",
  "Cache",
  "CacheStorage",
  "Clipboard",
  "Headers",
  "Geolocation",
  "MediaQueryList",
  "Navigator",
  "Notification",
  "NotificationOptions",
  "NotificationPermission",
  "NodeList",
  "PermissionDescriptor",
  "PermissionName",
  "PermissionState",
  "PermissionStatus",
  "Permissions",
  "Position",
  "PositionError",
  "PositionOptions",
  "Request",
  "RequestCache",
  "RequestInit",
  "Response",
  "ResponseType",
  "Storage",
  "Url",
] }
wasm-bindgen-futures = "0.4"
base64 = "0.22"
serde-wasm-bindgen = "0.6"
send_wrapper = "0.6"
rusqlite = { version = "0.31", default-features = false }
url = "2"
chrono = "0.4"
hex = "0.4"
sha2 = "0.10"
uuid = { version = "1.22", features = ["v4", "v7", "js"] }
regex = "1"
once_cell = "1"
radroots-nostr = { path = "../lib/crates/nostr" }
radroots-types = { path = "../lib/crates/types" }
radroots-sql-core = { path = "../lib/crates/sql-core" }
radroots-replica-db = { path = "../lib/crates/replica-db" }
radroots-replica-db-schema = { path = "../lib/crates/replica-db-schema" }
radroots-replica-sync = { path = "../lib/crates/replica-sync" }
mf2-i18n-core = { path = "../../../../vendor/triesap/mf2-i18n/crates/mf2-i18n-core" }
mf2-i18n-embedded = { path = "../../../../vendor/triesap/mf2-i18n/crates/mf2-i18n-embedded" }

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
strip = true

[profile.wasm-release]
inherits = "release"
codegen-units = 1
lto = true
opt-level = "z"
panic = "abort"
strip = true
