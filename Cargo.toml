[workspace]
members = [
    "crates/apple/security",
    "crates/android",
    "crates/core",
    "crates/desktop",
    "crates/ios",
    "crates/remote-signer",
    "crates/test-support",
    "crates/web",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Radroots Authors"]
rust-version = "1.92.0"
license = "GPL-3.0-or-later"
repository = "https://github.com/radrootslabs/studio_app"
homepage = "https://radroots.org"
readme = "README.md"

[workspace.dependencies]
android_logger = "0.15.1"
eframe = { version = "0.33.3", default-features = false, features = ["default_fonts"] }
egui = { version = "0.33.3", features = ["serde"] }
image = { version = "0.25.10", default-features = false, features = ["ico", "png"] }
jni = "0.21.1"
log = "0.4.28"
ndk-context = "0.1.1"
nostr = { version = "0.44.1", default-features = false, features = ["std"] }
nostr-browser-signer = "0.44.1"
objc2-foundation = { version = "0.3.2", default-features = false, features = ["std"] }
radroots-app-apple-security = { path = "crates/apple/security" }
radroots-geocoder = { path = "../lib/crates/geocoder" }
radroots-identity = { path = "../lib/crates/identity", default-features = false, features = ["std", "nip49"] }
radroots-nostr = { path = "../lib/crates/nostr", default-features = false, features = ["std", "client"] }
radroots-nostr-accounts = { path = "../lib/crates/nostr-accounts", default-features = false, features = ["std", "file-store", "os-keyring"] }
radroots-nostr-connect = { path = "../lib/crates/nostr-connect" }
radroots-runtime-paths = { path = "../lib/crates/runtime-paths" }
radroots-secret-vault = { path = "../lib/crates/secret-vault", default-features = false, features = ["std"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["rt", "sync", "time"] }
url = "2.5.7"
wasm-bindgen-futures = "0.4.50"
web-sys = { version = "0.3.91", features = ["Document", "HtmlCanvasElement", "Window"] }
wgpu = { version = "27.0.1", default-features = false }
winit = { version = "0.30.13", features = ["android-game-activity"] }
zeroize = "1.8.2"

[workspace.lints.rust]
unsafe_code = "forbid"

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
strip = true
