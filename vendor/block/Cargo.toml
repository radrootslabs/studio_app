[package]
name = "block"
version = "0.1.6"
authors = ["Steven Sheldon"]
edition = "2024"
rust-version = "1.92.0"

description = "Rust interface for Apple's C language extension of blocks."
keywords = ["blocks", "osx", "ios", "objective-c"]
repository = "http://github.com/SSheldon/rust-block"
documentation = "http://ssheldon.github.io/rust-objc/block/"
license = "MIT"
include = ["Cargo.toml", "LICENSE-MIT", "src/lib.rs"]

[package.metadata.radroots]
source = "crates.io:block:0.1.6"
upstream_repository = "https://github.com/SSheldon/rust-block"
upstream_manifest_sha = "f414e7ef2458b35fd72cebc3014ab4a977808aa3"
license_evidence = "LICENSE-MIT"
replacement_reason = "Patched local source replacement for the block v0.1.6 future-incompat warning emitted by the Studio GPUI/macOS dependency stack."
patch_scope = [
    "make the Objective-C class marker inhabited",
    "declare Objective-C block runtime externs with an explicit C ABI",
    "remove unpackaged upstream test helper references",
    "align the manifest with the Studio Rust 1.92.0 edition 2024 toolchain",
]
validation = [
    "cargo extbuild run -- cargo check -p block --all-targets",
    "cargo extbuild run -- cargo test -p block",
    "cargo extbuild run -- cargo tree -i block",
]

[workspace]
resolver = "2"
